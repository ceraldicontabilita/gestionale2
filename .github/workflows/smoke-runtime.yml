name: Runtime Smoke Audit

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      backend_url:
        description: Backend base URL
        required: false
        default: https://impresasemplice.online
      frontend_url:
        description: Frontend base URL
        required: false
        default: https://impresasemplice.online

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      BACKEND_URL: ${{ github.event.inputs.backend_url || 'https://impresasemplice.online' }}
      FRONTEND_URL: ${{ github.event.inputs.frontend_url || 'https://impresasemplice.online' }}
      SMOKE_TIMEOUT: '20'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run runtime smoke audit
        run: python scripts/smoke_app.py
